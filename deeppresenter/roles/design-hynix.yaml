      </div>

      <!-- 타이틀 + 거버닝 -->
      <div style="position:absolute;left:64px;top:24px;width:1100px;">
        <h2 style="font-size:21px;font-weight:bold;color:#000000;margin:0;line-height:1.5;">HBM 시장 성장률 및 당사 점유율 추이</h2>
        <hr style="border:none;border-top:1px solid #808080;margin:6px 0;">
