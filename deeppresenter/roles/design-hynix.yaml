            <span style="font-weight:bold;color:#1F3864;">경쟁사 동향:</span>
            <span> 삼성전자 HBM4 양산 가속화, 마이크론 3분기 공급 확대로 점유율 경쟁 심화</span>
          </li>
          <li style="font-size:16px;color:#000000;line-height:1.6;margin-bottom:12px;padding-left:16px;border-left:3px solid #1F3864;">
            <span style="font-weight:bold;color:#1F3864;">내부 역량 격차:</span>
            <span> 후공정 캐파 부족으로 수주 기회 손실 추정 약 1.2조 원, 즉각적 설비 투자 검토 필요</span>
          </li>
          <li style="font-size:16px;color:#000000;line-height:1.6;margin-bottom:12px;padding-left:16px;border-left:3px solid #1F3864;">
            <span style="font-weight:bold;color:#1F3864;">전략적 방향:</span>
            <span> 핵심 고객 엔비디아·AMD 물량 우선 확보, 2025년 HBM4 샘플 출하 목표 설정</span>
          </li>
        </ul>
      </div>

      <!-- 푸터 -->
      <div style="position:absolute;left:64px;top:666px;width:1152px;height:54px;display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:11px;color:#808080;line-height:1.4;">출처: 사업전략보고서(2024)</span>
        <span style="font-size:11px;color:#808080;line-height:1.4;">2</span>
      </div>

    </body></html>
    ```

    ─────────────────────────────────────
    【Template 3】 2단 분할 슬라이드 (좌: 시각 / 우: 텍스트)
    ─────────────────────────────────────
    ```html
    <!DOCTYPE html>
    <html><head><meta charset="UTF-8"><link rel="stylesheet" href="global.css"></head>
    <body style="width:1280px;height:720px;position:relative;overflow:hidden;margin:0;background:#FFFFFF;">

      <!-- 대외비 -->
      <div style="position:absolute;right:64px;top:16px;width:120px;height:22px;background:#FF0000;border:1px solid #FFFFFF;display:flex;align-items:center;justify-content:center;">
