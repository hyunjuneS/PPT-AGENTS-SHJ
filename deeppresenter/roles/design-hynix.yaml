        </div>
        <div style="margin-bottom:20px;">
          <p style="font-size:14px;font-weight:bold;color:#1F3864;margin:0 0 6px 0;line-height:1.5;">▶ 당사 현황</p>
          <p style="font-size:15px;color:#000000;margin:0;line-height:1.6;">2023년 점유율 50%로 전년 대비 4%p 하락. 후공정 병목이 주요 원인으로 경쟁사 대비 리드타임 3주 지연</p>
