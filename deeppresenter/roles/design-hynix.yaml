      </div>

      <!-- 본문 불릿 -->
      <div style="position:absolute;left:64px;top:186px;width:1152px;height:456px;overflow:hidden;">
        <ul style="margin:0;padding:0 0 0 20px;list-style:none;">
          <li style="font-size:16px;color:#000000;line-height:1.6;margin-bottom:12px;padding-left:16px;border-left:3px solid #1F3864;">
            <span style="font-weight:bold;color:#1F3864;">HBM3E 수요 급증:</span>
            <span> 2024년 HBM 시장 규모 전년 대비 2.4배 성장, AI 서버 탑재율 85% 돌파 예상</span>
